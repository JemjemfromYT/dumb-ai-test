<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Titan | S20 Dynamic</title>
    <style>
        :root { --bg: #09090b; --ui: #18181b; --accent: #10b981; --text: #fafafa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: monospace; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 12px; background: var(--ui); border-bottom: 1px solid #27272a; text-align: center; }
        #pct { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        #status { font-size: 10px; color: #a1a1aa; }

        #chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .b { padding: 10px 14px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .ai { align-self: flex-start; background: #27272a; border-left: 3px solid var(--accent); }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: bold; }
        .sys { align-self: center; width: 100%; font-size: 11px; color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 8px; border-radius: 4px; }
        .sys-good { align-self: center; width: 100%; font-size: 11px; color: var(--accent); background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); padding: 8px; border-radius: 4px; }

        #in-wrap { padding: 12px; background: var(--ui); display: flex; gap: 8px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #27272a; }
        input { flex: 1; background: #09090b; border: 1px solid #3f3f46; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <div id="pct">SCANNING...</div>
    <div id="status">Locating compatible Nano-model</div>
</header>

<div id="chat">
    <div class="b ai">System booting. Scanning WebLLM library for the smallest available model...</div>
</div>

<div id="in-wrap">
    <input type="text" id="in" placeholder="Wait for scanner..." disabled>
    <button id="btn" onclick="start()" disabled>INIT</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let targetModelId = null;
    
    const ui = {
        pct: document.getElementById('pct'),
        stat: document.getElementById('status'),
        chat: document.getElementById('chat'),
        in: document.getElementById('in'),
        btn: document.getElementById('btn')
    };

    // 1. Auto-scan library on load
    window.onload = () => {
        try {
            const allModels = webllm.prebuiltAppConfig.model_list;
            
            // Filter for known small architectures
            let tinyModels = allModels.filter(m => 
                m.model_id.includes("0.5B") || 
                m.model_id.includes("135M") || 
                m.model_id.includes("TinyLlama")
            );

            // Sort by lowest VRAM required
            tinyModels.sort((a, b) => (a.vram_required_MB || 9999) - (b.vram_required_MB || 9999));
            
            // Pick the best instruct model available right now
            const bestModel = tinyModels.find(m => m.model_id.includes("Instruct") || m.model_id.includes("Chat")) || tinyModels[0];
            
            if (bestModel) {
                targetModelId = bestModel.model_id;
                logEvent(`Found active model: ${targetModelId} (VRAM: ~${bestModel.vram_required_MB || 'Unknown'}MB)`, 'sys-good');
                ui.pct.innerText = "READY";
                ui.stat.innerText = "Target Locked";
                ui.btn.disabled = false;
            } else {
                logEvent("Could not find any nano models in the database.", 'sys');
            }
        } catch (err) {
            logEvent("Failed to load library data: " + err.message, 'sys');
        }
    };

    // 2. Initialize the dynamic model
    window.start = async () => {
        if (!engine) {
            ui.btn.disabled = true;
            ui.stat.innerText = "Bypassing Limits...";

            try {
                engine = new webllm.MLCEngine();
                engine.setInitProgressCallback((report) => {
                    const p = Math.round(report.progress * 100);
                    ui.pct.innerText = p + "%";
                    ui.stat.innerText = report.text.includes("Finish") ? "Compiling Shaders..." : "Downloading...";
                });

                await engine.reload(targetModelId);
                
                ui.pct.innerText = "ONLINE";
                ui.stat.innerText = "LOCAL AI ACTIVE";
                ui.in.disabled = false;
                ui.in.placeholder = "Message Auto-Titan...";
                ui.btn.disabled = false;
                ui.btn.innerText = "SEND";
                logEvent("Success. Model is running on your GPU.", 'sys-good');
            } catch (err) {
                logEvent("CRITICAL DRIVER ERROR: " + err.message, 'sys');
                ui.btn.disabled = false;
                ui.btn.innerText = "RETRY";
            }
            return;
        }

        const msg = ui.in.value.trim();
        if (!msg) return;

        append(msg, 'user');
        ui.in.value = "";
        const aiMsg = append("...", 'ai');

        try {
            const out = await engine.chat.completions.create({
                messages: [{ role: "user", content: msg }],
                stream: true
            });

            let full = "";
            for await (const chunk of out) {
                full += chunk.choices[0]?.delta?.content || "";
                aiMsg.innerText = full;
                ui.chat.scrollTop = ui.chat.scrollHeight;
            }
        } catch (err) {
            logEvent("RUNTIME ERR: " + err.message, 'sys');
        }
    };

    function append(t, c) {
        const d = document.createElement('div');
        d.className = `b ${c}`;
        d.innerText = t;
        ui.chat.appendChild(d);
        ui.chat.scrollTop = ui.chat.scrollHeight;
        return d;
    }

    function logEvent(m, c) {
        const d = document.createElement('div');
        d.className = c;
        d.innerText = m;
        ui.chat.appendChild(d);
        ui.chat.scrollTop = ui.chat.scrollHeight;
    }
</script>

</body>
</html>
